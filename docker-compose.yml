version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override URL so backend talks to the qdrant container, not localhost
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - backend_uploads:/app/uploads
      - backend_exports:/app/exports
      - backend_cache:/app/cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_uploads:
  backend_exports:
  backend_cache:
